name: Keep Bot Alive

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 --retry 3 --retry-delay 5 \
            "${{ secrets.RENDER_URL }}")
          echo "Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Bot is alive!"
          else
            echo "Bot returned $STATUS"
            exit 1
          fi
